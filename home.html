<head>
    <title>Futurestack</title>
</head>

<body style="margin:0px;padding:0px;">
    <!-- Section 1 -->
    <div style="display: flex;">
        <h1 id="el-1" class="futurestack">Hello Team. Welcome to the programming world
        </h1>
    </div>
    <!-- <p>We are learning fullstack development. Keep rocking.</p>
    <button onclick="fetchHtmlFromUrl()">Get data</button> -->
    <div id="profiles" style="margin-top:30px"></div>
    <p id="typing" style="margin-top:30px"></p>

    <div id="login" style="margin-top:10px;width: 500px; padding:50px;">
        <p>Please enter your name to login</p>
        <p id="typing" style="margin-top:30px">
        </p>
        <input style="margin-top:30px" id="username" placeholder="Type your name" />
        <button style="margin-top:30px" onclick="saveUser()">Save</button>
    </div>
    <div id="chat" style="margin-top:30px;width: 500px; padding:50px;display: none;">
        <div id="message-container"
            style="margin-top:30px;
        width: 300px;height:500px;border:20px solid;border-radius: 10px 10px 0 0;display: flex;flex-direction: column;">
            <p style="background-color: #232626;margin:0;padding:15px;color:white">Future stack </p>

            <div id="messages"
                style="overflow: scroll;flex:1;padding:10px;background-image: url('https://static.vecteezy.com/system/resources/previews/007/356/671/non_2x/school-supplies-seamless-pattern-free-vector.jpg');background-repeat: no-repeat;background-size: cover;">
            </div>
            <div style="display: flex;background-color: rgb(168, 166, 166);gap:4px;height: 35px;padding: 5px 2px">
                <input style="width:100%" id="input" placeholder="Type something..." />
                <button style="width:40px;border-radius: 25px;border:none;color:white;background-color: green;"
                    onclick="send()">></button>
            </div>
        </div>

    </div>

</body>
<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>

    const socket = io(); // connect to server
    let username = null;

    function saveUser() {
        const userNameEle = document.getElementById('username'); // gert input user name
        if (!userNameEle.value) {
            alert('Please enter your name')
            return;
        };

        username = userNameEle.value;

        const loginEle = document.getElementById('login');
        loginEle.style.display = 'none';

        const chatEle = document.getElementById('chat');
        chatEle.style.display = 'block';

    }

    const messages = document.getElementById('messages');

    socket.on('mygroup1', (data) => {
        const messageContainer = document.createElement('div');
        messageContainer.style.display = 'flex';
        messageContainer.style.marginTop = '5px';
        messageContainer.style.padding = '5px';
        messageContainer.style.borderRadius = '5px';
        messageContainer.style.justifyContent = 'right';
        const messageSection = document.createElement('div');
        const senderName = document.createElement('span');
        const message = document.createElement('p');
        const messageTime = document.createElement('span');
        message.textContent = data.message;
        message.style.margin = 0;
        message.style.overflowBreak = 'break-word';
        message.style.wordBreak = 'break-word';
        messageTime.textContent = getTime()
        messageTime.style.float = 'right';
        messageTime.style.fontSize = '12px';
        messageTime.style.margin = '10px 0';
        messageTime.style.color = '#656262';
        messageTime.style.margin = '0 0 5px 0';
        messageSection.style.padding = '0 5px 0 5px';
        messageSection.style.color = 'white';
        messageSection.style.borderRadius = '7px 7px 0 7px';
        messageSection.style.padding = '8px 4px 0 4px';
        messageSection.style.width = '150px';
        messageSection.style.background = '#21C063';
        if (data.name !== username) {
            messageTime.style.color = '#a8a8a8';
            message.style.margin = '14px 0 0 0';
            messageContainer.style.justifyContent = 'left';
            messageSection.style.background = '#232626';
            messageSection.style.borderRadius = '7px 7px 7px 0';
            senderName.textContent = data.name;
            senderName.style.color = '#a791ff';
            senderName.style.float = 'left';
            senderName.style.fontSize = '12px';
            messageSection.appendChild(senderName);
        }
        messageSection.appendChild(message);
        messageSection.appendChild(messageTime);
        messageContainer.appendChild(messageSection);

        messages.appendChild(messageContainer);
    });
    socket.on('someonetyping', (name) => {
        const typingText = document.getElementById('typing');

        if (name === username) return; // return here the code below will not execute
        console.log('\n Typing...', name);
        console.log('\n typingText', typingText.textContent);
        typingText.textContent = name + ' is typing...'
    });
    socket.on('typingstopped', (msg) => {
        const typingText = document.getElementById('typing');
        console.log('\n Typing stopped');
        typingText.textContent = '';
    });

    const input = document.getElementById('input');


    function send() {
        if (input.value) {
            console.log("\n Sending message", input.value)
            socket.emit('mygroup1', { message: input.value, eventType: 'message', name: username }); // Emit custom event
            input.value = '';
        }
    }

    let timer;
    const waitTime = 500;

    // The function to execute when the user stops typing
    const doneTyping = () => {
        socket.emit('typingstopped'); // Emit custom event
    };

    // Listen for the 'keyup' event on the input field
    input.addEventListener('keyup', (e) => {
        // Clear the previous timer to prevent the old action from executing
        clearTimeout(timer);

        // Update status while typing
        socket.emit('someonetyping', username); // Emit custom event

        // Set a new timer to call the 'doneTyping' function after the specified waitTime
        timer = setTimeout(doneTyping, waitTime);
    });


    async function fetchHtmlFromUrl() {
        const url = "http://localhost:4000/profile"
        try {
            const response = await fetch(url);
            // Check if the request was successful (status 200-299)
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            const htmlContent = await response.json();
            console.log('success', htmlContent);
            console.log(htmlContent);
            const el = document.getElementById('profiles')
            el.innerHTML = JSON.stringify(htmlContent);
            return htmlContent;
        } catch (error) {
            console.error('Error fetching HTML:', error);
        }
    }

    function getTime() {
        const dateObject = new Date(Date.now());
        const hrs = dateObject.getHours();
        const hours = String(hrs).padStart(2, '0');
        const minutes = String(dateObject.getMinutes()).padStart(2, '0');
        const t = hrs > 12 ? 'PM' : 'AM';

        const formattedTime = `${hours}:${minutes} ${t}`;
        console.log(formattedTime); // Example output: "09:30:51"
        return formattedTime;
    }
    // fetchHtmlFromUrl('http://localhost:4000/profile');
</script>
